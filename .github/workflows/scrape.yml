name: Scrape NBA 2K Ratings

on:
  # Run on the 1st and 15th of each month at 3 AM UTC
  schedule:
    - cron: '0 3 1,15 * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      team_type:
        description: 'Team type to scrape'
        required: true
        default: 'curr'
        type: choice
        options:
          - curr
          - class
          - allt
          - all
      reconcile_dry_run:
        description: 'Reconcile in DRY-RUN (report departed/orphan players, delete nothing)'
        required: false
        default: false
        type: boolean

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # 2kratings.com is behind Cloudflare's JS challenge, which blocks HEADLESS
    # Chrome (HTTP 403). We run the browser HEADED under a virtual display
    # (xvfb) so the challenge is solved like a real browser. Headless runs
    # silently scraped 0 players for weeks while reporting success — the
    # scraper now also exits non-zero on a 0-player run so this can't regress
    # quietly again.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --with-deps installs the OS libraries Chromium needs; xvfb provides the
      # virtual display that lets us run headed in a headless CI environment.
      - name: Install Playwright Chromium + system deps
        run: |
          npx playwright install --with-deps chromium
          sudo apt-get update && sudo apt-get install -y xvfb

      - name: Generate Convex client
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npx convex codegen

      - name: Run scraper (current teams)
        if: github.event_name == 'schedule' || github.event.inputs.team_type == 'curr'
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          # Scheduled runs always reconcile for real; manual dispatch can preview.
          RECONCILE_DRY_RUN: ${{ github.event.inputs.reconcile_dry_run || 'false' }}
        run: bash scripts/scrape-retry.sh curr

      - name: Run scraper (classic teams)
        if: github.event.inputs.team_type == 'class'
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          # Scheduled runs always reconcile for real; manual dispatch can preview.
          RECONCILE_DRY_RUN: ${{ github.event.inputs.reconcile_dry_run || 'false' }}
        run: bash scripts/scrape-retry.sh class

      - name: Run scraper (all-time teams)
        if: github.event.inputs.team_type == 'allt'
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          # Scheduled runs always reconcile for real; manual dispatch can preview.
          RECONCILE_DRY_RUN: ${{ github.event.inputs.reconcile_dry_run || 'false' }}
        run: bash scripts/scrape-retry.sh allt

      - name: Run scraper (all team types)
        if: github.event.inputs.team_type == 'all'
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          # Scheduled runs always reconcile for real; manual dispatch can preview.
          RECONCILE_DRY_RUN: ${{ github.event.inputs.reconcile_dry_run || 'false' }}
        run: |
          bash scripts/scrape-retry.sh curr
          bash scripts/scrape-retry.sh class
          bash scripts/scrape-retry.sh allt
