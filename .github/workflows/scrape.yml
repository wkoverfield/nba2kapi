name: Scrape NBA 2K Ratings

on:
  # Run on the 1st and 15th of each month at 3 AM UTC
  schedule:
    - cron: '0 3 1,15 * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      team_type:
        description: 'Team type to scrape'
        required: true
        default: 'curr'
        type: choice
        options:
          - curr
          - class
          - allt
          - all

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run scraper (current teams)
        if: github.event_name == 'schedule' || github.event.inputs.team_type == 'curr'
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: node scripts/runScraper.js curr

      - name: Run scraper (classic teams)
        if: github.event.inputs.team_type == 'class'
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: node scripts/runScraper.js class

      - name: Run scraper (all-time teams)
        if: github.event.inputs.team_type == 'allt'
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: node scripts/runScraper.js allt

      - name: Run scraper (all team types)
        if: github.event.inputs.team_type == 'all'
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          node scripts/runScraper.js curr
          node scripts/runScraper.js class
          node scripts/runScraper.js allt
